<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/style.css" />
  <title>Personal Dashboard</title>
</head>
<body>
  <!-- Theme toggle (top-right) -->
  <button id="theme-toggle" aria-label="Toggle light/dark mode"></button>

  <main>
    <!-- Greeting Widget -->
    <section id="greeting" aria-label="Greeting">
      <div id="time">--:--</div>
      <div id="date"></div>
      <h1 id="greeting-text">Good Morning, <span id="user-name">Friend</span></h1>
    </section>

    <!-- Focus Timer -->
    <section id="timer" aria-label="Focus timer">
      <h2 class="section-heading">Focus Timer</h2>
      <div id="timer-display">25:00</div>
      <div id="timer-controls">
        <button id="btn-start">Start</button>
        <button id="btn-stop">Stop</button>
        <button id="btn-reset">Reset</button>
      </div>
      <label for="duration-input">Duration (min)</label>
      <input id="duration-input" type="number" min="1" max="90" value="25" />
    </section>

    <!-- To-Do List -->
    <section id="todo" aria-label="To-do list">
      <h2 class="section-heading">To-Do List</h2>
      <div id="todo-add">
        <input id="task-input" type="text" placeholder="Add a task..." />
        <button id="btn-add-task" aria-label="Add task">+</button>
      </div>
      <ul id="task-list"></ul>
    </section>

    <!-- Quick Links Panel -->
    <section id="quick-links" aria-label="Quick links">
      <h2 class="section-heading">Quick Links</h2>
      <button id="btn-add-link">+ Add Link</button>
      <div id="links-grid"></div>
    </section>
  </main>

  <!-- Name Modal -->
  <div id="modal-name" class="modal" role="dialog" aria-modal="true" aria-label="Set your name">
    <div class="modal-box">
      <input id="name-input" type="text" maxlength="50" placeholder="Your name" />
      <button id="btn-name-submit">Save</button>
      <button class="btn-modal-close" aria-label="Close">×</button>
    </div>
  </div>

  <!-- Add-Link Modal -->
  <div id="modal-link" class="modal" role="dialog" aria-modal="true" aria-label="Add a link">
    <div class="modal-box">
      <input id="link-name-input" type="text" placeholder="Display name" />
      <input id="link-url-input" type="url" placeholder="https://example.com" />
      <span id="link-error" class="error-msg" aria-live="polite"></span>
      <button id="btn-link-submit">Add</button>
      <button class="btn-modal-close" aria-label="Close">×</button>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
